services:
  - type: web
    name: bot-finanzas-web
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bot_whatsapp_v4:app
    envVars:
      - key: TOKEN
        sync: false
      - key: PHONE_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bot-finanzas-db
          property: connectionString

databases:
  - name: bot-finanzas-db
    plan: starter